basePath: /api
definitions:
  serializer.ConstructionJSON:
    properties:
      construction_title:
        type: string
      description:
        type: string
      id:
        type: integer
      image_url:
        type: string
      is_delete:
        type: boolean
      use_life:
        type: string
      video_url:
        type: string
    type: object
  serializer.DendroConstructionUpdateJSON:
    properties:
      cutting_date:
        type: string
      date_correction:
        type: string
      samples_count:
        type: integer
    type: object
  serializer.DendroConstructionViewJSON:
    properties:
      construction_id:
        type: integer
      construction_title:
        type: string
      cutting_date:
        type: string
      date_correction:
        type: string
      id:
        type: integer
      image_url:
        type: string
      samples_count:
        type: integer
      use_life:
        type: string
    type: object
  serializer.DendrochronologyDetailJSON:
    properties:
      build_date:
        type: integer
      constructions:
        items:
          $ref: '#/definitions/serializer.DendroConstructionViewJSON'
        type: array
      creator_login:
        type: string
      date_completed:
        type: string
      date_create:
        type: string
      date_formed:
        type: string
      id:
        type: integer
      moderator_login:
        type: string
      status:
        type: string
      total_samples:
        type: integer
    type: object
  serializer.DendrochronologyListJSON:
    properties:
      build_date:
        type: integer
      creator_login:
        type: string
      date_completed:
        type: string
      date_create:
        type: string
      date_formed:
        type: string
      dated_constructions_count:
        type: integer
      id:
        type: integer
      moderator_login:
        type: string
      status:
        type: string
      total_samples:
        type: integer
    type: object
  serializer.DendrochronologyUpdateJSON:
    properties:
      build_date:
        type: integer
    type: object
  serializer.FinishJSON:
    properties:
      status:
        type: string
    type: object
  serializer.UserJSON:
    properties:
      id:
        type: integer
      is_moderator:
        type: boolean
      login:
        type: string
      password:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'REST API: каталог конструкций, заявки на дендрохронологический анализ.
    Без авторизации доступны только GET каталога; с JWT — методы пользователя; модератор
    — создание конструкций и завершение заявок.'
  title: Dendrochronology API
  version: "1.0"
paths:
  /constructions:
    get:
      parameters:
      - description: Поиск по названию
        in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/serializer.ConstructionJSON'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Список конструкций
      tags:
      - constructions
    post:
      consumes:
      - multipart/form-data
      description: multipart/form-data; только для is_moderator.
      parameters:
      - description: Название
        in: formData
        name: construction_title
        required: true
        type: string
      - description: Use-life
        in: formData
        name: use_life
        required: true
        type: string
      - description: Описание
        in: formData
        name: description
        required: true
        type: string
      - description: Изображение
        in: formData
        name: image
        type: file
      - description: Видео
        in: formData
        name: video
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/serializer.ConstructionJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Создать конструкцию
      tags:
      - constructions
  /constructions/{id}:
    get:
      parameters:
      - description: ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.ConstructionJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Конструкция по id
      tags:
      - constructions
  /constructions/{id}/add-to-dendrochronology:
    post:
      description: Добавляет конструкцию в черновик заявки; при первом добавлении
        создаётся заявка (201 + Location).
      parameters:
      - description: ID конструкции
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Добавить в корзину
      tags:
      - dendrochronologies
  /dendrochronologies:
    get:
      description: Без черновика и удалённых; фильтры по дате формирования и статусу.
        Пользователь видит свои; модератор — все.
      parameters:
      - description: Начало диапазона даты формирования, YYYY-MM-DD
        in: query
        name: from_date
        type: string
      - description: Конец диапазона, YYYY-MM-DD
        in: query
        name: to_date
        type: string
      - description: Фильтр по статусу заявки
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/serializer.DendrochronologyListJSON'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Список заявок на дендроанализ
      tags:
      - dendrochronologies
  /dendrochronologies/{id}:
    delete:
      parameters:
      - description: ID заявки
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 'status: deleted'
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Удалить заявку
      tags:
      - dendrochronologies
    get:
      description: 'Состав конструкций и логины; доступ: создатель или модератор.'
      parameters:
      - description: ID заявки
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyDetailJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Заявка по id
      tags:
      - dendrochronologies
    put:
      consumes:
      - application/json
      parameters:
      - description: ID заявки
        in: path
        name: id
        required: true
        type: integer
      - description: Поля для обновления
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serializer.DendrochronologyUpdateJSON'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Обновить заявку
      tags:
      - dendrochronologies
  /dendrochronologies/{id}/finish:
    put:
      consumes:
      - application/json
      description: Установка итогового статуса; только для модератора.
      parameters:
      - description: ID заявки
        in: path
        name: id
        required: true
        type: integer
      - description: Статус завершения
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serializer.FinishJSON'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Завершить заявку
      tags:
      - dendrochronologies
  /dendrochronologies/{id}/form:
    put:
      parameters:
      - description: ID заявки
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Оформить заявку
      tags:
      - dendrochronologies
  /dendrochronologies/cart:
    get:
      description: 'Если черновика нет — { "status": "no_draft", "constructions_count":
        0 }.'
      produces:
      - application/json
      responses:
        "200":
          description: CartJSON (dendrochronology_id, constructions_count) или no_draft
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Корзина (черновик)
      tags:
      - dendrochronologies
  /dendrochronology-constructions/{construction_id}/{dendrochronology_id}:
    delete:
      parameters:
      - description: ID конструкции
        in: path
        name: construction_id
        required: true
        type: integer
      - description: ID заявки
        in: path
        name: dendrochronology_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendrochronologyListJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Удалить строку из заявки
      tags:
      - dendrochronologies
    put:
      consumes:
      - application/json
      description: Образцы, даты резки и коррекции для пары конструкция–заявка.
      parameters:
      - description: ID конструкции
        in: path
        name: construction_id
        required: true
        type: integer
      - description: ID заявки
        in: path
        name: dendrochronology_id
        required: true
        type: integer
      - description: Поля
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serializer.DendroConstructionUpdateJSON'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/serializer.DendroConstructionUpdateJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Изменить строку заявки
      tags:
      - dendrochronologies
  /users/signin:
    post:
      consumes:
      - application/json
      description: Возвращает token и пользователя; устанавливает cookie auth_token.
      parameters:
      - description: Логин и пароль
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serializer.UserJSON'
      produces:
      - application/json
      responses:
        "200":
          description: token, user
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Вход в систему
      tags:
      - users
  /users/signout:
    post:
      description: 'Требует Authorization: Bearer или cookie auth_token.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - ApiKeyAuth: []
      summary: Выход
      tags:
      - users
  /users/signup:
    post:
      consumes:
      - application/json
      description: Создание учётной записи (без авторизации).
      parameters:
      - description: Логин и пароль
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/serializer.UserJSON'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/serializer.UserJSON'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Регистрация пользователя
      tags:
      - users
securityDefinitions:
  ApiKeyAuth:
    description: 'Передавайте JWT: "Bearer \<token\>" (тот же токен, что в cookie
      auth_token после входа).'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
