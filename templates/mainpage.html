<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дендрохронологический анализ древесины</title>
  <link rel="stylesheet" href="/static/styles/styles.css">
</head>
<body>
<div class="mainpage">
  <div class="header-bar">
    <div class="header-logo">
      <a href="/" class="prototype-link">
        <img src="/static/img/YURDIS_logo.svg" class="YURDIS_logo" alt="logo" />
        <img src="/static/img/YURDIS_logo_text.svg" class="YURDIS_logo_text" alt="logo-text" />
      </a>
    </div>
    <form action="/" method="GET" class="search-form">
      <input class="search-input" type="text" name="query" placeholder="Найти конструкцию" value="{{ .query }}">
      <button class="search-btn" type="submit" aria-label="search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </form> 
  </div>


  <div class="cards-grid">
    {{ range .constructions }}
    <div class="construction-card">
      <a href="/construction/{{ .ID }}" class="card-link">
        {{ if .ImageURL }}
        <img src="{{ $.minioBase }}/{{ .ImageURL }}" class="card-image" alt="{{ .ConstructionTitle }}" />
        {{ else }}
        <div class="card-image card-image-placeholder"></div>
        {{ end }}
        <div class="card-info">
          <p class="card-title">{{ .ConstructionTitle }}</p>
          <p class="card-uselife">{{ .UseLife }}</p>
        </div>
      </a>
      <div class="card-actions">
        <form action="/add-to-dendrochronology" method="POST">
          <input type="hidden" name="construction_id" value="{{ .ID }}">
          <button type="submit" class="btn-add-small">+ В заявку</button>
        </form>
      </div>
    </div>
    {{ end }}
  </div>

  <div class="cart-badge {{ if eq .cartCount 0 }}cart-inactive{{ end }}">
    {{ if ne .cartCount 0 }}
    <a href="/dendrochronology">
    {{ end }}
      <img src="/static/img/cart_icon.png" class="cart-icon" alt="корзина" />
      <span class="cart-count">{{ .cartCount }}</span>
    {{ if ne .cartCount 0 }}
    </a>
    {{ end }}
  </div>
</div>
</body>
</html>
